name: Refresh analytics summary

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh analytics summary
        env:
          GOATCOUNTER_API_TOKEN: ${{ secrets.GOATCOUNTER_API_TOKEN }}
          GOATCOUNTER_SITE_CODE: sikunskylerguo
          GOATCOUNTER_SITE_URL: https://sikun-skyler-guo.github.io
        run: node scripts/update-analytics-summary.mjs

      - name: Commit updated summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/analytics-summary.json
          if git diff --cached --quiet; then
            echo "No analytics changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh analytics summary"
          git push
